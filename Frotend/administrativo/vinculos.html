<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Vínculos Familiares | UCAB Service</title>
  <link rel="stylesheet" href="vinculos.css">
  <link rel="stylesheet" href="../shared/navbar.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<main class="vinculos-main">

  <div class="page-header">
    <span class="breadcrumb">GESTIÓN DE PERSONAL</span>
    <h1>Vínculos Familiares</h1>
    <p class="subtitulo">Familiares registrados como carga del personal de la institución.</p>
  </div>

  <div class="barra-acciones">
    <button class="btn-nuevo" onclick="abrirModalNuevo()">+ Registrar familiar</button>
  </div>

  <table class="tabla-vinculos">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Cédula</th>
        <th>Parentesco</th>
        <th>Edad</th>
        <th>Subtipo</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla-body">
      <tr><td colspan="7" class="texto-vacio">Cargando...</td></tr>
    </tbody>
  </table>

</main>

<!-- MODAL: registrar / editar familiar -->
<div id="modal-vinculo" class="modal-overlay" style="display:none;">
  <div class="modal-caja">
    <h2 id="modal-titulo">Registrar familiar</h2>
    <form id="form-vinculo">
      <input type="hidden" id="modo-edicion" value="nuevo">

      <div class="campo">
        <label>Cédula del familiar</label>
        <input type="number" id="f-ci" required>
      </div>
      <div class="campo">
        <label>Nombre completo</label>
        <input type="text" id="f-nombre" required>
      </div>
      <div class="campo">
        <label>Fecha de nacimiento</label>
        <input type="date" id="f-fecha-nac" required>
      </div>
      <div class="campo">
        <label>Parentesco</label>
        <select id="f-parentesco" required>
          <option value="Hijo">Hijo / Hija</option>
          <option value="Conyuge">Cónyuge</option>
          <option value="Padre">Padre / Madre</option>
          <option value="Hermano">Hermano / Hermana</option>
        </select>
      </div>
      <div class="campo">
        <label>Subtipo</label>
        <select id="f-subtipo" onchange="cambiarSubtipo()">
          <option value="sin_subtipo">Ninguno (ej. cónyuge)</option>
          <option value="menor">Carga menor de edad</option>
          <option value="mayor_estudiante">Carga mayor — sigue estudiando</option>
        </select>
      </div>

      <!-- Campos de CARGA MENOR -->
      <div id="campos-menor" class="campos-subtipo" style="display:none;">
        <div class="campo">
          <label>Esquema de vacunación</label>
          <input type="text" id="f-vacunacion" placeholder="Ej: Esquema completo MPPS 2026">
        </div>
        <div class="campo">
          <label>Centro de educación inicial</label>
          <input type="text" id="f-centro-edu" placeholder="Ej: Colegio San Ignacio">
        </div>
      </div>

      <!-- Campos de CARGA MAYOR ESTUDIANTE -->
      <div id="campos-mayor" class="campos-subtipo" style="display:none;">
        <div class="campo">
          <label>Constancia de estudio</label>
          <input type="text" id="f-constancia" placeholder="Ej: Constancia UCV-2026-0345">
        </div>
        <div class="campo">
          <label>Certificado de soltería</label>
          <input type="text" id="f-solteria" placeholder="Ej: Certificado civil 2026-0098">
        </div>
      </div>

      <div class="modal-acciones">
        <button type="button" class="btn-cancelar" onclick="cerrarModal()">Cancelar</button>
        <button type="submit" class="btn-guardar">Guardar</button>
      </div>
    </form>
  </div>
</div>

<script src="../shared/api.js"></script>
<script src="../shared/navbar.js"></script>
<script src="vinculos.js"></script>
</body>
</html>
