<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Iniciar Sesión | UCAB Service</title>
  <link rel="stylesheet" href="login.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="background-layer">
    <div class="gradient-overlay"></div>
    <div class="bg-image-fallback"></div>
  </div>

  <main class="login-container">
    <div class="brand-identity">
      <h1>UCAB Service</h1>
      <p>Excelencia Académica y Gestión Digital</p>
    </div>

    <div class="glass-card">
      <div class="avatar-header">
        <div class="icon-circle">U</div>
      </div>
      
      <h2>Iniciar Sesión</h2>
      
      <form id="formLogin" class="form-login">
        
        <div class="form-group">
          <label for="email">Correo Institucional</label>
          <div class="input-relative">
            <span class="icon-input">@</span>
            <input type="email" id="email" placeholder="correo@ucab.edu.ve" required>
          </div>
        </div>
        
        <div class="form-group">
          <label for="cedula">Cédula de Identidad</label>
          <div class="input-relative">
            <span class="icon-input">CI</span>
            <input type="number" id="cedula" placeholder="Ej: 26543210" required>
          </div>
        </div>

        <div id="mensaje-alerta" class="alerta-banner"></div>

        <button class="btn-ingresar" type="submit">
          Ingresar al Portal
        </button>
      </form>
    </div>

    <footer class="login-footer">
      <div class="footer-links">
        <a href="#">Soporte Técnico</a>
        <a href="#">Manual de Usuario</a>
        <a href="#">Privacidad</a>
      </div>
      <p>© 2026 Universidad Católica Andrés Bello</p>
    </footer>
  </main>

  <script src="../shared/api.js"></script>
  <script src="login.js"></script>
</body>
</html>
