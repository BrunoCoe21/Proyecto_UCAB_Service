<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Edificación</title>
  <!-- Bootstrap CSS (opcional, pero simple) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="edificacion.css">
</head>
<body>
  <div class="container mt-5">
    <h2>Agregar Nueva Edificación</h2>
    <form id="formEdificacion">
      <div class="mb-3">
        <label for="nombre_sede" class="form-label">Sede</label>
        <select id="nombre_sede" class="form-select" required>
          <option value="">Seleccione una sede...</option>
          <!-- Las opciones se cargarán desde la BD -->
        </select>
      </div>
      <div class="mb-3">
        <label for="nombre_edif" class="form-label">Nombre de la Edificación</label>
        <input type="text" id="nombre_edif" class="form-control" placeholder="Ej: Edificio Cincuentenario" required>
      </div>
      <div class="mb-3">
        <label for="direccion_interna" class="form-label">Dirección Interna</label>
        <input type="text" id="direccion_interna" class="form-control" placeholder="Ej: Av. Teherán, Montalbán">
      </div>
      <button type="submit" class="btn btn-primary">Guardar</button>
      <div id="mensaje" class="mt-3"></div>
    </form>
  </div>

  <script src="edificacion.js"></script>
</body>
</html>
