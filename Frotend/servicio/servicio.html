<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Catálogo de Servicios | UCAB Services</title>
  
  <link rel="stylesheet" href="../shared/navbar.css?v=1">
  <link rel="stylesheet" href="servicio.css?v=5">
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    .servicios-grid {
      display: grid !important;
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 24px !important;
      width: 100% !important;
    }
    
    @media (max-width: 768px) {
      .servicios-grid {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
</head>
<body>

<main class="catalogo-main">
  <div class="page-header">
    <span class="breadcrumb">PORTAL DEL MIEMBRO</span>
    <h1>Catálogo de Servicios</h1>
    <p class="subtitle">Sede Montalbán · Precios ajustados según tu rol y sede</p>
  </div>

  

  <div style="max-width:1200px; margin:0 auto 20px auto; padding: 0 20px; display:flex; align-items:center; gap:12px;">
    <label style="font-weight:600; color:#334155;">Filtrar por sede:</label>
    <select id="filtro-sede" onchange="filtrarPorSede()" style="padding:8px 14px; border:1px solid #cbd5e1; border-radius:8px; font-size:14px; min-width:200px;">
      <option value="">Todas las sedes</option>
      <option value="Montalban">Montalbán</option>
      <option value="Guayana">Guayana</option>
    </select>
  </div>

  <div class="catalogo-layout">
    <!-- Contenedor de servicios -->
    <div id="catalogo-dinamico">
      <p style="text-align:center; padding: 40px; color:#8a9bb2;">Cargando catálogo de servicios...</p>
    </div>

    <!-- Panel lateral derecho -->
    <aside class="detalle-sidebar">
      <div class="tarjeta-blanca sticky-panel" id="panel-detalle">
        <div class="detalle-vacio">
          <span class="icono">📋</span>
          <h3>Selecciona un servicio</h3>
          <p>Haz clic en "Solicitar Trámite" en cualquier servicio para ver los detalles aquí.</p>
        </div>
      </div>
    </aside>
  </div>
</main>

<script src="../shared/aviso.js"></script>
  <script src="../shared/api.js"></script>
<script src="../shared/navbar.js"></script>
<script src="servicio.js"></script>
</body>
</html>
