<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listado de Espacios Físicos</title>
  <link rel="stylesheet" href="mostrarEspacioFisico.css">
</head>
<body>
  <div class="container">
    <h2>Listado de Espacios Físicos</h2>
    <div class="table-wrapper">
      <table id="tablaEspacios">
        <thead>
          <tr>
            <th>Sede</th>
            <th>Tipo de espacio</th>
            <th>Máximo aforo</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyEspacios">
          <!-- Los datos se cargan dinámicamente -->
        </tbody>
      </table>
    </div>
    <div id="mensaje"></div>
  </div>
  <script src="mostrarEspacioFisico.js"></script>
</body>
</html>
