<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agregar Usuario</title>
  <link rel="stylesheet" href="agregarUsuario.css">
</head>
<body>
  <div class="container">
    <h2>Registrar Nuevo Usuario</h2>
    <form id="formUsuario" class="form-usuario">
      <div class="form-row">
        <div class="form-group">
          <label>Cédula:</label>
          <input type="number" id="cedula_identidad" required>
        </div>
        <div class="form-group">
          <label>Correo institucional:</label>
          <input type="email" id="correo_institucional" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Primer nombre:</label>
          <input type="text" id="primer_nombre" required>
        </div>
        <div class="form-group">
          <label>Segundo nombre:</label>
          <input type="text" id="segundo_nombre">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Primer apellido:</label>
          <input type="text" id="primer_apellido" required>
        </div>
        <div class="form-group">
          <label>Segundo apellido:</label>
          <input type="text" id="segundo_apellido">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de nacimiento:</label>
          <input type="date" id="fecha_nacimiento" required>
        </div>
        <div class="form-group">
          <label>Sexo:</label>
          <select id="sexo" required>
            <option value="">Seleccionar...</option>
            <option value="M">Masculino</option>
            <option value="F">Femenino</option>
          </select>
        </div>
      </div>

      <div class="form-group full-width">
        <label>Dirección:</label>
        <input type="text" id="direccion_habitacion_detallada" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Teléfono:</label>
          <input type="text" id="numero_telefono" required>
        </div>
        <div class="form-group">
          <label>Contraseña (mín. 8 caracteres):</label>
          <input type="password" id="contrasena" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Estado de cuenta:</label>
          <select id="estado_cuenta">
            <option value="activa">Activa</option>
            <option value="suspendida">Suspendida</option>
            <option value="bloqueada">Bloqueada</option>
          </select>
        </div>
        <div class="form-group">
          <label>Verificación en 2 pasos:</label>
          <select id="estatus_verificacion_dos_pasos">
            <option value="false">No</option>
            <option value="true">Sí</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-guardar">Guardar Usuario</button>
      <div id="mensaje" class="mensaje"></div>
    </form>
  </div>

  <script src="agregarUsuario.js"></script>
</body>
</html>
